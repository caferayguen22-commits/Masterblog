<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flask Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Welcome to My Flask Blog!</h1>

    <p style="text-align: center;">
        <a href="{{ url_for('add') }}" style="background-color: #4F4F4F; color: white; padding: 10px 15px; border-radius: 4px; text-decoration: none; display: inline-block; margin-bottom: 20px;">➕ Add New Post</a>
    </p>

    {% for post in posts %}
    <div class="post">
        <h2>{{ post.title }}</h2>
        <p><em>Written by {{ post.author }}</em></p>
        <p>{{ post.content }}</p>

        <p style="text-align: right;">
            <a href="{{ url_for('delete', post_id=post.id) }}"
               style="background-color: #D9534F; color: white; padding: 6px 12px; border-radius: 4px; text-decoration: none; font-size: 14px;"
               onclick="return confirm('Möchtest du diesen Beitrag wirklich löschen?');">
               🗑️ Delete
            </a>
        </p>
    </div>
    {% endfor %}

</body>
</html>
