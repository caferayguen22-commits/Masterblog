<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Post</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Add a New Blog Post</h1>

    <div class="post">
        <form action="{{ url_for('add') }}" method="POST">
            <p>
                <label for="author">Author:</label><br>
                <input type="text" id="author" name="author" required style="width: 100%; padding: 8px; margin-top: 5px; border-radius: 4px; border: 1px solid #DDD;">
            </p>
            <p>
                <label for="title">Title:</label><br>
                <input type="text" id="title" name="title" required style="width: 100%; padding: 8px; margin-top: 5px; border-radius: 4px; border: 1px solid #DDD;">
            </p>
            <p>
                <label for="content">Content:</label><br>
                <textarea id="content" name="content" rows="5" required style="width: 100%; padding: 8px; margin-top: 5px; border-radius: 4px; border: 1px solid #DDD;"></style></textarea>
            </p>
            <p>
                <button type="submit" style="background-color: #4F4F4F; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer;">Save Post</button>
                <a href="{{ url_for('index') }}" style="margin-left: 10px; color: #333; text-decoration: none;">Cancel</a>
            </p>
        </form>
    </div>
</body>
</html>
